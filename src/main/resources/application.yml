spring:
  application:
    name:
      hotels
  profiles:
    active: h2
    jpa:
      open-in-view: false
      hibernate:
        ddl-auto: update
      show-sql: true
server:
  port: 8092
springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

---

spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:hoteldb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

---

spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 1234
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect